<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0c0e1a" media="(prefers-color-scheme: dark)">
    <meta name="description" content="CowxOTP — A modern TOTP authenticator">
    <title>CowxOTP</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%236366f1'/%3E%3Cstop offset='100%25' stop-color='%238b5cf6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-family='sans-serif' font-size='52' font-weight='bold' fill='white' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link id="dark-mode" rel="stylesheet" href="index_dark.css" disabled>
    <script src="main.js" defer></script>
  </head>
  <body>
    <svg style="position:absolute;width:0;height:0;">
      <defs>
        <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#6366f1"/>
          <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
    </svg>

    <div id="header">
      <div id="app-icon">C</div>
      <div id="app-name">CowxOTP</div>
      <div id="header-actions">
        <button id="dark-toggle" class="icon-btn" title="Toggle dark mode">&#9790;</button>
      </div>
    </div>

    <div id="account-list"></div>

    <div id="empty-state" style="display:none;">
      <div id="empty-state-icon">&#128274;</div>
      <h3>No accounts yet</h3>
      <p>Add your first account to generate TOTP codes</p>
    </div>

    <button id="fab" title="Add account">+</button>

    <div id="modal-overlay">
      <div id="modal-sheet">
        <div id="modal-header">
          <div id="modal-title">Add Account</div>
          <button id="modal-close">&times;</button>
        </div>

        <div class="form-group">
          <label class="form-label" for="input-secret">Secret or OTP Auth URI</label>
          <div class="input-with-actions">
            <input id="input-secret" class="form-input" type="password" placeholder="JBSWY3DPEHPK3PXP" autocomplete="off">
            <button id="scan-video" class="input-action" title="Scan QR code with camera">&#128247;</button>
            <button id="scan-image-btn" class="input-action" title="Scan QR code from image">&#128444;</button>
          </div>
          <input id="input-image" type="file" accept="image/*" style="display:none;">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="input-account">Account</label>
            <input id="input-account" class="form-input" placeholder="john.doe">
          </div>
          <div class="form-group">
            <label class="form-label" for="input-issuer">Issuer</label>
            <input id="input-issuer" class="form-input" placeholder="GitHub">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="input-period">Period (s)</label>
            <input id="input-period" class="form-input" type="number" value="30" min="1" max="300">
          </div>
          <div class="form-group">
            <label class="form-label" for="input-type">Type</label>
            <select id="input-type" class="form-select">
              <option value="totp">TOTP</option>
              <option value="steam">Steam</option>
            </select>
          </div>
        </div>

        <div id="qr-preview-container">
          <img id="qr-preview" style="display:none;">
          <div id="qr-preview-placeholder">QR code preview</div>
        </div>

        <div class="modal-actions">
          <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="modal-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <div id="scanner-overlay">
      <div id="scanner-container">
        <video id="scanner-video"></video>
      </div>
    </div>

    <div id="toast">Copied!</div>

    <div id="footer">
      <a id="github-link" href="https://github.com/cowxotp/cowxotp" target="_blank" rel="noopener" title="GitHub">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
      <span id="version"></span>
    </div>
  </body>
</html>
